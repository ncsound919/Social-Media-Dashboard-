---
# Authelia Configuration for Social Media Dashboard
server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

jwt_secret: "${AUTHELIA_JWT_SECRET}"

default_redirection_url: "${APP_BASE_URL}"

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
      salt_length: 16

session:
  name: authelia_session
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: 3600
  inactivity: 300
  domain: "${SESSION_DOMAIN}"

regulation:
  max_retries: 5
  find_time: 120
  ban_time: 300

storage:
  encryption_key: "${AUTHELIA_STORAGE_KEY}"
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

identity_providers:
  oidc:
    hmac_secret: "${AUTHELIA_OIDC_HMAC_SECRET}"
    issuer_private_key: |
      ${AUTHELIA_OIDC_PRIVATE_KEY}
    access_token_lifespan: 1h
    authorize_code_lifespan: 1m
    id_token_lifespan: 1h
    refresh_token_lifespan: 90m
    enable_client_debug_messages: false
    clients:
      # Social Ops Studio Dashboard
      - id: social-ops-studio
        description: Social Ops Studio Dashboard
        secret: "${AUTHELIA_CLIENT_SECRET_DASHBOARD}"
        public: false
        authorization_policy: two_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/authelia"
        scopes:
          - openid
          - profile
          - email
          - groups
        userinfo_signing_algorithm: none

      # LinkedIn OAuth Proxy
      - id: linkedin-proxy
        description: LinkedIn Platform Connector
        secret: "${AUTHELIA_CLIENT_SECRET_LINKEDIN}"
        public: false
        authorization_policy: two_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/linkedin"
        scopes:
          - openid
          - profile
          - email
        userinfo_signing_algorithm: none

      # Twitter/X OAuth Proxy
      - id: twitter-proxy
        description: Twitter/X Platform Connector
        secret: "${AUTHELIA_CLIENT_SECRET_TWITTER}"
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/twitter"
        scopes:
          - openid
          - profile
        userinfo_signing_algorithm: none

      # Meta (Facebook/Instagram) OAuth Proxy
      - id: meta-proxy
        description: Meta Platform Connector
        secret: "${AUTHELIA_CLIENT_SECRET_META}"
        public: false
        authorization_policy: two_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/meta"
        scopes:
          - openid
          - profile
          - email
        userinfo_signing_algorithm: none

      # TikTok OAuth Proxy
      - id: tiktok-proxy
        description: TikTok Platform Connector
        secret: "${AUTHELIA_CLIENT_SECRET_TIKTOK}"
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/tiktok"
        scopes:
          - openid
          - profile
        userinfo_signing_algorithm: none

      # YouTube/Google OAuth Proxy
      - id: youtube-proxy
        description: YouTube Platform Connector
        secret: "${AUTHELIA_CLIENT_SECRET_YOUTUBE}"
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/youtube"
        scopes:
          - openid
          - profile
          - email
        userinfo_signing_algorithm: none

      # Pinterest OAuth Proxy
      - id: pinterest-proxy
        description: Pinterest Platform Connector
        secret: "${AUTHELIA_CLIENT_SECRET_PINTEREST}"
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - "${APP_BASE_URL}/api/auth/callback/pinterest"
        scopes:
          - openid
          - profile
        userinfo_signing_algorithm: none

access_control:
  default_policy: deny
  rules:
    # Admin gets full two_factor access
    - domain: "${SESSION_DOMAIN}"
      policy: two_factor
      subject: "group:admins"
    # Editors get one_factor access
    - domain: "${SESSION_DOMAIN}"
      policy: one_factor
      subject: "group:editors"
    # Viewers get one_factor read-only access
    - domain: "${SESSION_DOMAIN}"
      policy: one_factor
      subject: "group:viewers"
    # Public auth endpoints
    - domain: "${SESSION_DOMAIN}"
      policy: bypass
      resources:
        - "^/api/auth/.*$"
        - "^/api/health$"
