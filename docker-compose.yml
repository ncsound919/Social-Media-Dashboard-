version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A celery_worker worker --loglevel=info -Q celery,ai_tasks
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app

  beat:
    build: .
    command: celery -A celery_worker beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app

  dashboard:
    build: .
    command: python marketing_tool.py --summary
    env_file: .env
    depends_on:
      - redis
    restart: "no"
    volumes:
      - .:/app
    working_dir: /app

  api:
    build: .
    command: uvicorn src.ai.api:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    working_dir: /app

  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    command: celery -A celery_worker worker --loglevel=info -Q ai_tasks
    env_file: .env
    environment:
      - AI_DEVICE=cuda
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - .:/app
      - ./media:/app/media
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
